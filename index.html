<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>RK's Game Score Tracker</title>
<style>
:root{--bg1:#0f2027;--bg2:#203a43;--bg3:#2c5364;--a:#00b4db;--b:#0083b0}
*{box-sizing:border-box}body{margin:0;padding:20px;font-family:Arial,sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));color:#fff}
.container{max-width:1400px;margin:auto}.card{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:16px;padding:20px;margin-bottom:20px}
header{display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:20px}
button{padding:10px 18px;border:none;border-radius:8px;background:linear-gradient(var(--a),var(--b));color:#fff;cursor:pointer}
input{padding:8px;border-radius:6px;border:1px solid #ccc}
.toolbar{display:flex;gap:10px;flex-wrap:wrap}#tableContainer{overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px;border:1px solid rgba(255,255,255,.15);text-align:center}thead th{position:sticky;top:0;background:#0b5fa5}th:first-child,td:first-child{position:sticky;left:0;background:#0b5fa5}.hidden{display:none}
input[readonly] {
    background-color: #eef7ff;
    color: #000;
    opacity: 1;
    cursor: default;
}
</style>
</head>
<body><div class="container">
<header><div><h1>RK's Score Tracker</h1><div id="roomLabel">Room: default</div></div><div id="statusBar">🟡 Connecting...</div></header>
<section id="setupCard" class="card"><h2>Create / Join Room</h2>
<p><label>Players</label><br><input id="numPlayers" type="number" min="2" value="4"></p><br>
<p><label>Games</label><br><input id="numGames" type="number" min="1" value="5"></p><br>
<p><label>Admin PIN (optional)</label><br><input id="adminPin" type="password"></p><br>
<button id="continueBtn">Continue</button></section>
<section id="playerCard" class="card hidden"><h2>Player Names</h2><div id="playerNames"></div><br><button id="createRoomBtn">Create Room</button></section>
<section id="toolbar" class="card hidden"><div class="toolbar"><button id="resetBtn">New Room</button><button id="exportBtn" disabled>Export CSV</button><button id="recalcBtn" disabled>Recalculate Scores</button><span id="roomInfo"></span></div></section>
<section id="tableCard" class="card hidden"><div id="tableContainer"></div></section>
<footer style="text-align:center;opacity:.8;margin-top:24px">Active Boys</footer>
<script type="module" src="firebase.js"></script>
<script type="module" src="script1.js"></script>
</div></body></html>
