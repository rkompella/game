<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title> From the Desk of RK - Game Score Tracker</title>

<style>
/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    padding:40px;
    background:
        linear-gradient(135deg,#0f2027,#203a43,#2c5364);
}

/* Heading */

h2{
    text-align:center;
    color:white;
    font-size:40px;
    margin-bottom:30px;
    letter-spacing:2px;
    text-shadow:0 5px 15px rgba(0,0,0,.4);
}

h3{
    color:white;
    margin-bottom:15px;
}

/* Setup Cards */

#setup,
#playerNames{

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(15px);

    border-radius:20px;

    padding:30px;

    margin-bottom:25px;

    box-shadow:
        0 20px 50px rgba(0,0,0,.35);

    border:1px solid rgba(255,255,255,.2);

    width:max-content;
}

/* Labels */

label{

    color:white;

    font-size:17px;

    font-weight:500;
}

/* Buttons */

button{

    margin-top:15px;

    padding:12px 28px;

    border:none;

    border-radius:10px;

    background:
    linear-gradient(145deg,#00c6ff,#0072ff);

    color:white;

    font-size:16px;

    font-weight:bold;

    cursor:pointer;

    transition:.25s;

    box-shadow:
        0 8px 20px rgba(0,114,255,.4);

}

button:hover{

    transform:translateY(-3px);

    box-shadow:
        0 15px 30px rgba(0,114,255,.5);

}

button:active{

    transform:translateY(2px);

}

/* Table Container */

#tableContainer{

    overflow:auto;

    margin-top:30px;

}

/* Table */

table{

    width:100%;

    border-collapse:collapse;

    overflow:hidden;

    border-radius:18px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(15px);

    box-shadow:
        0 25px 60px rgba(0,0,0,.35);

}

/* Header */

thead th{

    position:sticky;

    top:0;

    background:
    linear-gradient(180deg,#00b4db,#0083b0);

    color:white;

    padding:18px;

    font-size:18px;

    text-transform:uppercase;

    letter-spacing:1px;

    z-index:5;

}

/* Cells */

tbody td{

    padding:14px;

    text-align:center;

    border-bottom:1px solid rgba(255,255,255,.08);

    transition:.25s;

}

/* Zebra */

tbody tr:nth-child(even){

    background:rgba(255,255,255,.05);

}

tbody tr:hover{

    background:rgba(255,255,255,.15);

}

/* Totals */

tfoot td{

    background:
    linear-gradient(180deg,#00b09b,#96c93d);

    color:white;

    font-weight:bold;

    font-size:18px;

    padding:16px;
	
	text-align: center;

}

/* Sticky Game Column */

th:first-child,
td:first-child{

    position:sticky;

    left:0;

    background:#0b5fa5;

    color:white;

    font-weight:bold;

    z-index:4;

}

/* Inputs */

input[type=number]{

    width:80px;

    height:42px;

    text-align:center;

    font-size:16px;

    border-radius:10px;

    border:2px solid #90caf9;

    background:white;

    transition:.25s;

    box-shadow:
        inset 0 3px 5px rgba(0,0,0,.1);

}

input[type=number]:focus{

    outline:none;

    border-color:#00b4db;

    background:#ffffd5;

    transform:scale(1.08);

    box-shadow:
        0 0 15px rgba(0,180,219,.6);

}

/* Scrollbar */

::-webkit-scrollbar{

    height:10px;
    width:10px;

}

::-webkit-scrollbar-thumb{

    background:#00b4db;

    border-radius:10px;

}

::-webkit-scrollbar-track{

    background:#1d2d44;

}

</style>
</head>

<body>

<h2> From the Desk of RK - Game Score Tracker</h2>

<div id="setup">
    <label>Number of Players:
        <input type="number" id="numPlayers" min="2" value="4">
    </label>

    <br><br>

    <label>Number of Games:
        <input type="number" id="numGames" min="1" value="5">
    </label>

    <br><br>

    <button onclick="setupPlayers()">Continue</button>
</div>

<div id="playerNames"></div>

<div id="tableContainer"></div>
<script src="Script-obf.js"></script>
</body>
</html>
